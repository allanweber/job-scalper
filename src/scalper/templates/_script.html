<script>
  // The draft-bar lives in <header>, outside any .panel, so it's wired once and
  // reads whichever .panel is currently visible (the active tab, or the only
  // panel on a single-profile report) to build a `scalper draft` command from
  // its checked rows.
  function updateDraftBar() {
    const bar = document.querySelector('.draft-bar');
    if (!bar) return;
    const cmd = bar.querySelector('.dcmd');
    const count = bar.querySelector('.dcount');
    const active = document.querySelector('.panel:not([hidden])');
    const uids = active
      ? Array.from(active.querySelectorAll('input.pick:checked')).map((cb) => cb.dataset.uid)
      : [];
    count.textContent = uids.length;
    cmd.value = uids.length && active
      ? `scalper draft ${uids.join(' ')} -p ${active.dataset.name} --resume resume.pdf`
      : '';
  }

  // Each profile lives in its own .panel; bind controls scoped to that root so
  // multiple tables (combined report) coexist without colliding on ids.
  function initPanel(root) {
    const tbl = root.querySelector('.tbl');
    if (!tbl) return;  // empty profile: nothing to wire
    const q = root.querySelector('.q');
    const minR = root.querySelector('.min');
    const minOut = root.querySelector('.minOut');
    const shown = root.querySelector('.shown');

    function pairs() {
      const rows = Array.from(tbl.tBodies[0].rows);
      const out = [];
      for (let i = 0; i < rows.length; i += 2) out.push([rows[i], rows[i + 1]]);
      return out;
    }

    function applyFilter() {
      const term = q.value.trim().toLowerCase();
      const min = parseInt(minR.value, 10);
      minOut.textContent = min;
      let visible = 0;
      for (const [job, detail] of pairs()) {
        const pct = parseInt(job.dataset.pct, 10);
        const hay = job.dataset.search;
        const ok = pct >= min && (!term || hay.includes(term));
        job.style.display = ok ? '' : 'none';
        if (!ok) detail.classList.remove('open');
        detail.style.display = ok ? '' : 'none';
        if (ok) visible++;
      }
      shown.textContent = visible + ' shown';
    }

    function sortBy(col, type, asc) {
      const data = pairs();
      data.sort(([a], [b]) => {
        let av, bv;
        if (type === 'num') {
          av = parseFloat(a.dataset[col === 'pct' ? 'pct' : 'pub']) || 0;
          bv = parseFloat(b.dataset[col === 'pct' ? 'pct' : 'pub']) || 0;
        } else {
          const idx = { title: 2, company: 3, loc: 4, salary: 6, src: 7 }[col];
          av = a.cells[idx].innerText.toLowerCase();
          bv = b.cells[idx].innerText.toLowerCase();
        }
        if (av < bv) return asc ? -1 : 1;
        if (av > bv) return asc ? 1 : -1;
        return 0;
      });
      const body = tbl.tBodies[0];
      for (const [job, detail] of data) { body.appendChild(job); body.appendChild(detail); }
    }

    tbl.tBodies[0].addEventListener('click', (e) => {
      if (e.target.closest('input.pick')) return;  // checkbox clicks shouldn't toggle the row
      const job = e.target.closest('tr.job');
      if (!job) return;
      const detail = job.nextElementSibling;
      if (detail && detail.classList.contains('detail')) detail.classList.toggle('open');
    });

    // Shift+click range selection for row checkboxes.
    let lastPickIdx = -1;
    tbl.tBodies[0].addEventListener('click', (e) => {
      const cb = e.target.closest('input.pick');
      if (!cb) return;
      const visible = pairs().filter(([job]) => job.style.display !== 'none');
      const curIdx = visible.findIndex(([job]) => job.querySelector('input.pick') === cb);
      if (curIdx === -1) return;
      if (e.shiftKey && lastPickIdx !== -1 && lastPickIdx !== curIdx) {
        const lo = Math.min(lastPickIdx, curIdx);
        const hi = Math.max(lastPickIdx, curIdx);
        for (let i = lo; i <= hi; i++) {
          const pick = visible[i][0].querySelector('input.pick');
          if (pick) pick.checked = cb.checked;
        }
        updateDraftBar();
      }
      lastPickIdx = curIdx;
    });

    const pickAll = root.querySelector('.pickall');
    if (pickAll) {
      pickAll.addEventListener('change', () => {
        for (const [job] of pairs()) {
          if (job.style.display === 'none') continue;
          const cb = job.querySelector('input.pick');
          if (cb) cb.checked = pickAll.checked;
        }
        updateDraftBar();
      });
    }
    tbl.tBodies[0].addEventListener('change', (e) => {
      if (e.target.matches('input.pick')) updateDraftBar();
    });
    const sortState = {};
    tbl.tHead.addEventListener('click', (e) => {
      const th = e.target.closest('th[data-sort]');
      if (!th) return;
      const col = th.dataset.col;
      sortState[col] = !sortState[col];
      sortBy(col, th.dataset.sort, sortState[col]);
    });
    q.addEventListener('input', applyFilter);
    minR.addEventListener('input', applyFilter);
    applyFilter();
  }

  document.querySelectorAll('.panel').forEach(initPanel);

  // Tab bar (combined report only): toggle which .panel is visible.
  const tabs = document.querySelector('.tabs');
  if (tabs) {
    tabs.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-target]');
      if (!btn) return;
      for (const b of tabs.querySelectorAll('button')) b.classList.toggle('active', b === btn);
      for (const p of document.querySelectorAll('.panel'))
        p.hidden = p.dataset.name !== btn.dataset.target;
      updateDraftBar();
    });
  }

  const draftBar = document.querySelector('.draft-bar');
  if (draftBar) {
    draftBar.querySelector('.dcopy').addEventListener('click', () => {
      const cmd = draftBar.querySelector('.dcmd');
      if (!cmd.value) return;
      cmd.select();
      navigator.clipboard?.writeText(cmd.value).catch(() => {});
    });
    updateDraftBar();
  }
</script>
